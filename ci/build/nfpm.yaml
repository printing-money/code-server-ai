name: "jack-code-server"
arch: "${NFPM_ARCH}"
platform: "linux"
version: "${NFPM_VERSION}"
section: "devel"
priority: "optional"
maintainer: "Joe Previte <joe@coder.com>"
description: |
  Jack Code Server: VS Code in the browser with AI extension compatibility.
vendor: "Printing Money"
homepage: "https://github.com/printing-money/jack-code-server"
license: "MIT"

contents:
  - src: ./ci/build/code-server-nfpm.sh
    dst: /usr/bin/code-server

  - src: ./ci/build/code-server-nfpm.sh
    dst: /usr/bin/jack-code-server

  - src: ./ci/build/jack-code-server-doctor-nfpm.sh
    dst: /usr/bin/jack-code-server-doctor

  - src: ./ci/build/code-server@.service
    dst: /usr/lib/systemd/system/code-server@.service

  - src: ./ci/build/code-server-user.service
    dst: /usr/lib/systemd/user/code-server.service

  - src: ./release/*
    dst: /usr/lib/code-server
